<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎀 Mi Cumpleaños 🎀</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink-hot:  #ff3d8b;
      --pink-mid:  #ff85b3;
      --pink-soft: #ffc2db;
      --pink-pale: #fff0f6;
      --gold:      #ffd700;
      --purple:    #c44dff;
      --white:     #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #ffe0f0 0%, #ffc2db 40%, #ffb3d1 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── CANVAS DE GLOBOS ─── */
    #balloon-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .balloon-svg {
      position: absolute;
      bottom: -180px;
      animation: floatUp linear forwards;
      filter: drop-shadow(2px 6px 10px rgba(0,0,0,0.18));
    }

    @keyframes floatUp {
      0%   { transform: translateY(0)      rotate(-3deg); opacity: 0; }
      5%   { opacity: 0.92; }
      48%  { transform: translateY(-50vh)  rotate(3deg);  opacity: 0.92; }
      52%  { transform: translateY(-54vh)  rotate(-2deg); opacity: 0.92; }
      95%  { opacity: 0.85; }
      100% { transform: translateY(-112vh) rotate(3deg);  opacity: 0; }
    }

    /* ─── NAV ─── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(90deg, var(--pink-hot), var(--purple), var(--pink-hot));
      background-size: 200% auto;
      animation: gradientMove 4s linear infinite;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 24px rgba(255,61,139,0.4);
      height: 68px;
    }
    @keyframes gradientMove {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .nav-logo {
      font-family: 'Pacifico', cursive;
      color: var(--white);
      font-size: 1.5rem;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.25);
      letter-spacing: 1px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .nav-links a {
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.45rem 1.1rem;
      border-radius: 30px;
      border: 2px solid rgba(255,255,255,0.35);
      transition: all 0.25s;
      letter-spacing: 0.5px;
    }
    .nav-links a:hover, .nav-links a.active {
      background: var(--white);
      color: var(--pink-hot);
      border-color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    /* ─── MAIN ─── */
    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 6rem;
      gap: 3rem;
    }

    /* ─── HERO ─── */
    .hero {
      text-align: center;
      animation: fadeInDown 1s ease both;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-emoji {
      font-size: 5rem;
      animation: bounce 1.6s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-18px); }
    }

    .hero h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2.4rem, 7vw, 5rem);
      color: var(--pink-hot);
      text-shadow: 3px 3px 0 var(--white), 5px 5px 0 rgba(255,61,139,0.25);
      line-height: 1.1;
      margin: 0.4rem 0;
    }

    .hero p {
      font-size: 1.25rem;
      color: var(--pink-hot);
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* ─── CONTADOR ─── */
    .countdown-card {
      background: var(--white);
      border-radius: 28px;
      padding: 2.5rem 3rem;
      box-shadow:
        0 0 0 6px var(--pink-soft),
        0 20px 60px rgba(255,61,139,0.25),
        0 4px 12px rgba(0,0,0,0.08);
      text-align: center;
      animation: fadeInUp 1.2s ease both 0.3s;
      max-width: 700px;
      width: 100%;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .countdown-title {
      font-family: 'Pacifico', cursive;
      color: var(--pink-hot);
      font-size: 1.5rem;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .countdown-grid {
      display: flex;
      gap: clamp(0.2rem, 1.5vw, 1rem);
      justify-content: center;
      flex-wrap: nowrap;   /* ← siempre en una sola línea */
      align-items: flex-start;
      width: 100%;
    }

    .countdown-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      flex: 1;             /* ← cada bloque ocupa espacio equitativo */
      min-width: 0;        /* ← permite comprimir si es necesario */
    }

    .countdown-num {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.6rem, 5.5vw, 4.5rem);   /* ← se achica en móvil */
      background: linear-gradient(135deg, var(--pink-hot), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      text-align: center;
      line-height: 1;
      filter: drop-shadow(0 2px 6px rgba(255,61,139,0.3));
      white-space: nowrap;
    }

    .countdown-label {
      font-size: clamp(0.55rem, 1.8vw, 0.8rem);  /* ← también escala */
      font-weight: 700;
      color: var(--pink-mid);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .countdown-sep {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.4rem, 4vw, 3rem);        /* ← separador escalable */
      color: var(--pink-soft);
      margin-top: 2px;
      line-height: 1;
      flex-shrink: 0;
    }

    .countdown-date {
      margin-top: 1.8rem;
      font-size: 1rem;
      color: var(--pink-mid);
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* ─── MENSAJE ─── */
    .message-card {
      background: linear-gradient(135deg, var(--pink-hot), var(--purple));
      border-radius: 24px;
      padding: 2rem 2.5rem;
      color: white;
      text-align: center;
      max-width: 580px;
      width: 100%;
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.7;
      box-shadow: 0 16px 48px rgba(255,61,139,0.35);
      animation: fadeInUp 1.2s ease both 0.6s;
    }
    .message-card .quote-emoji { font-size: 2.5rem; display: block; margin-bottom: 0.8rem; }

    /* ─── SECCIONES PLACEHOLDER ─── */
    #galeria, #mensajes, #deseos, #contacto {
      width: 100%;
      max-width: 700px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(255,61,139,0.12);
      text-align: center;
      border: 2px dashed var(--pink-soft);
      animation: fadeInUp 1s ease both 0.8s;
      scroll-margin-top: 80px;
    }

    .section-title {
      font-family: 'Pacifico', cursive;
      color: var(--pink-hot);
      font-size: 2rem;
      margin-bottom: 0.8rem;
    }

    .section-sub {
      color: var(--pink-mid);
      font-weight: 600;
      font-size: 1rem;
    }

    .btn-pink {
      display: inline-block;
      margin-top: 1.2rem;
      padding: 0.7rem 2rem;
      background: linear-gradient(135deg, var(--pink-hot), var(--purple));
      color: white;
      border-radius: 50px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(255,61,139,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-pink:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(255,61,139,0.5); }

    /* ─── CONFETTI SPARKLES ─── */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      font-size: 1.4rem;
      animation: sparkleFloat linear infinite;
      opacity: 0.7;
    }
    @keyframes sparkleFloat {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-90vh) rotate(360deg) scale(0.5); opacity: 0; }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .nav-links { gap: 0.3rem; }
      .nav-links a { font-size: 0.78rem; padding: 0.35rem 0.7rem; }
      .countdown-card { padding: 1.5rem 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- Globos flotantes -->
  <div id="balloon-canvas"></div>

  <!-- NAV -->
  <nav>
    <span class="nav-logo">🎀 Mire</span>
    <ul class="nav-links">
      <li><a href="#inicio"   class="active">🏠 Mire</a></li>
    </ul>
  </nav>

  <main>
    <!-- ─── HERO ─── -->
    <section id="inicio" style="scroll-margin-top:80px">
      <div class="hero">
        <span class="hero-emoji">🎂</span>
        <h1>¡Cumpleaños de Mire!</h1>
        <p>🎉 Una fecha muy especial se acerca 🎉</p>
      </div>
    </section>

    <!-- ─── CONTADOR ─── -->
    <div class="countdown-card">
      <div class="countdown-title">Cuenta regresiva 🎈</div>
      <div class="countdown-grid">
        <div class="countdown-box">
          <span class="countdown-num" id="days">00</span>
          <span class="countdown-label">Días</span>
        </div>
        <span class="countdown-sep">:</span>
        <div class="countdown-box">
          <span class="countdown-num" id="hours">00</span>
          <span class="countdown-label">Horas</span>
        </div>
        <span class="countdown-sep">:</span>
        <div class="countdown-box">
          <span class="countdown-num" id="minutes">00</span>
          <span class="countdown-label">Min</span>
        </div>
        <span class="countdown-sep">:</span>
        <div class="countdown-box">
          <span class="countdown-num" id="seconds">00</span>
          <span class="countdown-label">Seg</span>
        </div>
      </div>
      <div class="countdown-date">16 de Junio, 2026 · </div>
    </div>

    <!-- ─── MENSAJE ─── -->
    <div class="message-card">
      <span class="quote-emoji">📁</span>
      "Te amo un montón, mi amor. Gracias por ser la luz de mis días y la alegría de mi vida... " <br>
      "Ve el folder"
    </div>


  </main>

  <script>
    /* ═══════════════════════════════
       1. CONTADOR REGRESIVO
    ═══════════════════════════════ */
    const target = new Date('2026-06-16T00:00:00');

    function pad(n){ return String(n).padStart(2,'0'); }

    function updateCountdown(){
      const now  = new Date();
      const diff = target - now;

      if(diff <= 0){
        document.getElementById('days').textContent    = '¡HOY!';
        document.getElementById('hours').textContent   = '🎂';
        document.getElementById('minutes').textContent = '🎉';
        document.getElementById('seconds').textContent = '🎈';
        return;
      }

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      const s = Math.floor((diff % 60000)    / 1000);

      document.getElementById('days').textContent    = pad(d);
      document.getElementById('hours').textContent   = pad(h);
      document.getElementById('minutes').textContent = pad(m);
      document.getElementById('seconds').textContent = pad(s);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    /* ═══════════════════════════════
       2. GLOBOS DINÁMICOS — forma SVG real
    ═══════════════════════════════ */
    const colors = [
      ['#ff3d8b','#ff85b3'],
      ['#ff69b4','#ffb6d9'],
      ['#c44dff','#e89fff'],
      ['#ff1493','#ff85b3'],
      ['#e040fb','#f0a0ff'],
      ['#ff6eb4','#ffc2db'],
      ['#f8a4cc','#ffd6ea'],
      ['#ff3d8b','#c44dff'],
    ];

    function createBalloon(){
      const size  = 55 + Math.random() * 60;          // ancho del globo
      const h     = size * 1.28;                       // alto proporcional
      const left  = Math.random() * 96;
      const dur   = 8 + Math.random() * 11;
      const delay = Math.random() * 5;
      const [c1, c2] = colors[Math.floor(Math.random() * colors.length)];
      const id    = 'bg' + Math.random().toString(36).slice(2);

      // SVG con path que imita la silueta real:
      // cuerpo ovoide más ancho en su tercio superior, estrecho abajo, nudo y hilo
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg   = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('width',  size);
      svg.setAttribute('height', h + 40);             // +40 para hilo
      svg.setAttribute('viewBox', `0 0 100 ${130 + 40}`);
      svg.classList.add('balloon-svg');
      svg.style.cssText = `left:${left}%; animation-duration:${dur}s; animation-delay:${delay}s;`;

      svg.innerHTML = `
        <defs>
          <radialGradient id="${id}" cx="38%" cy="30%" r="62%">
            <stop offset="0%"   stop-color="rgba(255,255,255,0.72)"/>
            <stop offset="45%"  stop-color="${c2}"/>
            <stop offset="100%" stop-color="${c1}"/>
          </radialGradient>
        </defs>

        <!-- Cuerpo del globo: ovoide asimétrico, más ancho arriba -->
        <path d="
          M 50 8
          C 85 8, 96 30, 94 58
          C 92 86, 78 108, 60 118
          C 55 121, 52 122, 50 122
          C 48 122, 45 121, 40 118
          C 22 108, 8 86, 6 58
          C 4 30, 15 8, 50 8 Z
        " fill="url(#${id})"/>

        <!-- Brillo superior izquierdo -->
        <ellipse cx="34" cy="28" rx="10" ry="6"
          fill="rgba(255,255,255,0.38)" transform="rotate(-30,34,28)"/>

        <!-- Nudo inferior -->
        <path d="M 46 122 Q 50 130 54 122" fill="none" stroke="${c1}" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="50" cy="131" rx="4" ry="3.5" fill="${c1}"/>

        <!-- Hilo ondulado -->
        <path d="M 50 134 Q 44 145 50 155 Q 56 165 50 170" fill="none"
          stroke="rgba(0,0,0,0.28)" stroke-width="1.5" stroke-linecap="round"/>
      `;

      document.getElementById('balloon-canvas').appendChild(svg);
      setTimeout(() => svg.remove(), (dur + delay + 1) * 1000);
    }

    // Lanzar globos continuamente
    for(let i = 0; i < 14; i++) setTimeout(createBalloon, i * 400);
    setInterval(createBalloon, 900);

    /* ═══════════════════════════════
       3. DESTELLOS / SPARKLES
    ═══════════════════════════════ */
    const sparkleEmojis = ['✨','🌸','💖','🎀','⭐','🌟','💝', '🦒'];

    function createSparkle(){
      const el   = document.createElement('span');
      el.className = 'sparkle';
      el.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
      const left = Math.random() * 100;
      const dur  = 5 + Math.random() * 8;
      const delay= Math.random() * 4;
      el.style.cssText = `left:${left}%; bottom:-40px; animation-duration:${dur}s; animation-delay:${delay}s;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), (dur + delay) * 1000);
    }

    for(let i = 0; i < 10; i++) setTimeout(createSparkle, i * 600);
    setInterval(createSparkle, 1200);

    /* ═══════════════════════════════
       4. SMOOTH SCROLL + ACTIVE NAV
    ═══════════════════════════════ */
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const target = document.querySelector(a.getAttribute('href'));
        if(target) target.scrollIntoView({ behavior:'smooth' });
        document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
        a.classList.add('active');
      });
    });
  </script>
</body>
</html>
